services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: muratorium
      POSTGRES_USER: muratorium
      POSTGRES_PASSWORD: muratorium
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "app.workers.celery_app:celery", "worker", "-l", "INFO"]

  beat:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "app.workers.celery_app:celery", "beat", "-l", "INFO"]

volumes:
  pgdata: